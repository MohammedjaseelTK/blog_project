{% extends 'blog/base.html' %}
{% block content %}
<div class="max-w-xl mx-auto">
  <div class="bg-white p-6 rounded shadow">
    <h2 class="text-xl mb-4">Edit Profile</h2>
    <form method="post" enctype="multipart/form-data" id="profile-form">
      {% csrf_token %}

      <div class="mb-4">
        <label for="{{ form.avatar.id_for_label }}" 
               class="cursor-pointer inline-block bg-gray-200 px-4 py-2 rounded text-gray-700 hover:bg-gray-300">
          Choose Avatar
        </label>
        {{ form.avatar }}

        <div class="mt-2">
          {% if user.profile.avatar %}
            <img id="avatar-preview" src="{{ user.profile.avatar.url }}" alt="Current avatar" 
                 class="w-20 h-20 rounded-full object-cover border border-gray-300">
          {% else %}
            <img id="avatar-preview" src="https://via.placeholder.com/80" alt="No avatar" 
                 class="w-20 h-20 rounded-full object-cover border border-gray-300">
          {% endif %}
        </div>
      </div>

      <div class="mb-4">
        {{ form.bio.label_tag }}
        {{ form.bio }}
      </div>

      <div class="mb-4">
        {{ form.website.label_tag }}
        {{ form.website }}
      </div>

      <button type="submit" class="mt-3 px-4 py-2 bg-blue-600 text-white rounded">Save</button>
    </form>
  </div>
</div>

<script>
  // JS to preview new avatar image before upload
  document.getElementById('{{ form.avatar.id_for_label }}').addEventListener('change', function(event){
    const [file] = event.target.files;
    if (file) {
      const preview = document.getElementById('avatar-preview');
      preview.src = URL.createObjectURL(file);
    }
  });
</script>
{% endblock %}
