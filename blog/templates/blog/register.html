{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - MyBlog</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #eceff1, #f9f9f9);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .signup-card {
      border-radius: 15px;
      border: none;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      background: #fff;
      padding: 2rem;
    }
    .signup-title {
      font-size: 2rem;
      font-weight: 700;
      color: #333;
      text-align: center;
    }
    .signup-subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 1.5rem;
    }
    .form-control {
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }
    .btn-signup {
      background: #4f46e5;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      padding: 0.75rem;
      transition: 0.3s;
    }
    .btn-signup:hover {
      background: #4338ca;
    }
    .login-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      color: #4f46e5;
      font-weight: 600;
      text-decoration: none;
    }
    .login-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="signup-card col-md-6 col-lg-5">
      <h1 class="signup-title">Create Account</h1>
      <p class="signup-subtitle">Join MyBlog and share your thoughts with the world 🌍</p>

      <form method="POST">
        {% csrf_token %}

        <div class="row g-3">
          <div class="col-md-6">
            <input type="text" name="first_name" class="form-control" placeholder="First Name" required>
          </div>
          <div class="col-md-6">
            <input type="text" name="last_name" class="form-control" placeholder="Last Name" required>
          </div>
        </div>

        <div class="mt-3">
          <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="mt-3">
          <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        </div>

        <div class="mt-3">
          <input type="password" name="password1" class="form-control" placeholder="Password" required>
        </div>

        <div class="mt-3">
          <input type="password" name="password2" class="form-control" placeholder="Confirm Password" required>
        </div>

        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-signup btn-lg">Sign Up</button>
        </div>
      </form>

      <a href="{% url 'login' %}" class="login-link">Already have an account? Log In</a>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
