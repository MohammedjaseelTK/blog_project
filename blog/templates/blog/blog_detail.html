{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ post.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-3xl font-bold mb-4">{{ post.title }}</h1>

    {% if post.image %}
      <img src="{{ post.image.url }}" alt="{{ post.title }}" class="w-full h-64 object-cover rounded-md mb-4" />
    {% endif %}

    <p class="text-gray-700 mb-6">{{ post.content }}</p>

    <div class="flex items-center gap-4 text-gray-600 text-sm">
      {% if post.author.profile.avatar %}
        <img src="{{ post.author.profile.avatar.url }}" alt="{{ post.author.username }}" class="w-8 h-8 rounded-full" />
      {% endif %}
      <span>{{ post.author.username }}</span>
      <span>•</span>
      <time>{{ post.created_at|date:"M d, Y" }}</time>
    </div>

    <a href="{% url 'latest_posts' %}" class="inline-block mt-6 text-blue-600 hover:underline">← Back to Latest Blogs</a>
  </div>
</body>
</html>
