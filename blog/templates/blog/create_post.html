{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Blog Post - MyBlog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
</head>
<body>

<div class="container mt-5">
  <h2 class="mb-4">Create a New Blog Post</h2>
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Title</label>
      <input type="text" class="form-control" placeholder="Blog title" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" rows="3" placeholder="Short description" required></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Content</label>
      <textarea class="form-control" rows="6" placeholder="Full content here..." required></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Category</label>
      <select class="form-select">
        <option>Technology</option>
        <option>Travel</option>
        <option>Food</option>
        <option>Fashion</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Image</label>
      <input type="file" class="form-control">
    </div>
    <button class="btn btn-primary" type="submit">Publish</button>
  </form>
</div>

</body>
</html>
