{% extends "blog/base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-100 to-gray-300">
  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
    
  
    <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">Welcome Back 👋</h2>
    <p class="text-center text-gray-500 mb-8">Login to continue exploring MyBlog</p>

    
    <form method="post" class="space-y-5">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit"
        class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-700 transition">
        Sign In
      </button>
    </form>

    
    <div class="text-center mt-4">
      <a href="#" class="text-indigo-600 text-sm hover:underline">Forgot Password?</a>
    </div>

    
    <div class="flex items-center my-6">
      <hr class="flex-grow border-gray-300">
      <span class="mx-3 text-gray-400 text-sm">OR</span>
      <hr class="flex-grow border-gray-300">
    </div>

    
    <div class="text-center">
      <a href="{% url 'register' %}"
         class="inline-block bg-green-500 text-white font-semibold px-6 py-3 rounded-xl hover:bg-green-600 transition">
        Create Account
      </a>
    </div>
  </div>
</div>
{% endblock %}
