{% extends "adminpanel/dashboard.html" %}
{% block content %}
<h2>All Likes</h2>
<table class="table">
  <thead>
    <tr>
      <th>#ID</th>
      <th>User</th>
      <th>Blog</th>
      <th>Created</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    {% for like in likes %}
    <tr>
      <td>{{ like.id }}</td>
      <td>{{ like.user.username }}</td>
      <td>{{ like.blog.title }}</td>
      <td>{{ like.created_at|date:"Y-m-d" }}</td>
      <td>
        <a href="{% url 'delete_like' like.id %}" 
           class="btn btn-danger btn-sm"
           onclick="return confirm('⚠️ Are you sure you want to delete this like?');">
           Delete
        </a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="5" class="text-center">No likes yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
