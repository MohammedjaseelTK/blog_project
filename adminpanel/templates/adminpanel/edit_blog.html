{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Edit Blog</title>
  <link rel="stylesheet" href="{% static 'adminpanel/css/style2.css' %}">
</head>
<body>
  <h2>Edit Blog</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Save</button>
    <a href="{% url 'admin_blogs' %}" class="btn btn-secondary">Cancel</a>
  </form>
</body>
</html>
