
{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>All Blogs</title>
  <link rel="stylesheet" href="{% static 'adminpanel/css/style2.css' %}">
</head>
<body>
  <h2>All Blogs</h2>

  <p><a href="{% url 'admin_dashboard' %}">← Back to Dashboard</a></p>

  <table class="table">
    <thead>
      <tr>
        <th>#ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Created</th>
        <th style="width:160px;">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for blog in blogs %}
      <tr>
        <td>{{ blog.id }}</td>
        <td>{{ blog.title }}</td>
        <td>{{ blog.author }}</td>
        <td>{{ blog.created_at|date:"Y-m-d" }}</td>
        <td>
          <a href="{% url 'edit_blog' blog.id %}" class="btn btn-warning btn-sm">Edit</a>
          <a href="{% url 'delete_blog' blog.id %}" class="btn btn-danger btn-sm"
             onclick="return confirm('Delete this blog?')">Delete</a>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="5" class="text-center">No blogs found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
